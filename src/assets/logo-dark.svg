<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" role="img" aria-labelledby="title desc">
  <title id="title">Layered icon</title>
  <desc id="desc">Clean layered isometric icon for dark backgrounds.</desc>

  <defs>
    <linearGradient id="purpleSide" x1="10" y1="34" x2="39" y2="34" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4c1d95"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="glassFace" x1="8" y1="10" x2="40" y2="27" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#a78bfa" stop-opacity="0.08"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="3" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <g filter="url(#softShadow)" stroke-linejoin="round" stroke-linecap="round">
    <path d="M24 25.5 40 33.5 24 41.5 8 33.5Z" fill="#ffffff" fill-opacity="0.10" stroke="#ffffff" stroke-opacity="0.48" stroke-width="1.2"/>
    <path d="M8 33.5 24 41.5v3.6L8 37.1Z" fill="#4c1d95" stroke="#ffffff" stroke-opacity="0.36" stroke-width="1"/>
    <path d="M24 41.5 40 33.5v3.6l-16 8Z" fill="url(#purpleSide)" stroke="#ffffff" stroke-opacity="0.36" stroke-width="1"/>
    <path d="M8 28.8v4.7M40 28.8v4.7M24 22.5v3" fill="none" stroke="#ffffff" stroke-opacity="0.30" stroke-width="1" stroke-dasharray="2 2"/>
    <path d="M24 6.5 40 14.5 24 22.5 8 14.5Z" fill="url(#glassFace)" stroke="#ffffff" stroke-opacity="0.82" stroke-width="1.4"/>
    <path d="M8 14.5 24 22.5v3.6l-16-8Z" fill="#ffffff" fill-opacity="0.045" stroke="#ffffff" stroke-opacity="0.52" stroke-width="1"/>
    <path d="M24 22.5 40 14.5v3.6l-16 8Z" fill="#8b5cf6" fill-opacity="0.16" stroke="#ffffff" stroke-opacity="0.52" stroke-width="1"/>
  </g>
</svg>
